<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oshanda Geethanjana - Premium Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --active-color: #888888;
            --bg-color: #f5f5f7; /* Apple's signature light gray */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        /* --- Loading Animation --- */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.8s;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 2px solid rgba(0,0,0,0.05);
            border-top-color: #1d1d1f;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }

        .loader-hidden { 
            opacity: 0; 
            visibility: hidden; 
        }

        /* --- Smooth Background Color Change --- */
        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background-color: var(--active-color);
            filter: blur(120px);
            opacity: 0.3; 
            transition: background-color 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 0 40px 0;
            z-index: 1;
        }

        /* --- Entrance Animations --- */
        .fade-up {
            opacity: 0;
            transform: translateY(40px);
            animation: fadeUpAnim 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .delay-1 { animation-delay: 0.3s; }
        .delay-2 { animation-delay: 0.5s; }
        .delay-3 { animation-delay: 0.7s; }

        @keyframes fadeUpAnim {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typography */
        .header {
            text-align: center;
        }

        .brand-name {
            font-size: 1.1rem;
            letter-spacing: 4px;
            color: #1d1d1f;
            font-weight: 600;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.8rem;
            color: #86868b;
            margin-top: 6px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- Wheel & Profile --- */
        .wheel-wrapper {
            position: relative;
            width: 100%;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .profile-center img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .profile-glass-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.5);
            pointer-events: none;
        }

        .wheel {
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            transform-origin: center center;
            will-change: transform;
        }

        /* --- Apple Glass Icons --- */
        .icon-item {
            position: absolute;
            width: 56px;
            height: 56px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            will-change: transform;
            transition: box-shadow 0.3s ease, background 0.3s ease;
        }

        .icon-item:hover {
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
        }

        .icon-item:active {
            transform: scale(0.9) translate(-50%, -50%) !important;
        }

        .icon-item img {
            width: 28px;
            height: 28px;
            object-fit: contain;
            pointer-events: none;
        }

        /* --- Apple Glass Bottom Navigation --- */
        .bottom-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 85%;
            padding: 18px 35px;
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .nav-item {
            color: #86868b;
            font-size: 1.3rem;
            cursor: pointer;
            transition: color 0.4s cubic-bezier(0.25, 1, 0.5, 1), transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .nav-item:hover {
            transform: translateY(-3px) scale(1.1);
        }

        .nav-item.active {
            color: var(--active-color);
            transform: translateY(-2px);
        }

        /* --- Desktop Responsive & Premium Tweaks --- */
        @media (min-width: 768px) {
            .app-container {
                max-width: 800px;
            }
            .bg-glow {
                width: 500px;
                height: 500px;
                filter: blur(180px);
            }
            .brand-name { font-size: 1.4rem; letter-spacing: 6px; }
            .subtitle { font-size: 0.9rem; }
            
            .profile-center { width: 150px; height: 150px; }
            .icon-item { width: 70px; height: 70px; }
            .icon-item img { width: 36px; height: 36px; }
            .bottom-nav { width: 50%; padding: 22px 45px; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div class="bg-glow"></div>

    <div class="app-container">
        <div class="header fade-up delay-1">
            <h1 class="brand-name">OSHANDA GEETHANJANA</h1>
            <p class="subtitle">Creative Developer</p>
        </div>
        
        <div class="wheel-wrapper fade-up delay-2">
            <div class="profile-center">
                <img src="assets/oshanda.png" alt="Profile">
                <div class="profile-glass-overlay"></div>
            </div>
            <div class="wheel" id="wheel"></div>
        </div>

        <div class="bottom-nav fade-up delay-3">
            <div class="nav-item active"><i class="fas fa-house"></i></div>
            <div class="nav-item"><i class="fas fa-layer-group"></i></div>
            <div class="nav-item"><i class="fas fa-compass"></i></div>
            <div class="nav-item"><i class="fas fa-envelope"></i></div>
        </div>
    </div>

    <script>
        // --- Loader Logic ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('loader-hidden');
            }, 600); // 600ms delay for a premium smooth reveal
        });

        const linksData = [
            { id: 'facebook', color: '#006eff', icon: 'assets/facebook.png', url: 'https://facebook.com' },
            { id: 'instagram', color: '#f50052', icon: 'assets/instagram.png', url: 'https://instagram.com' },
            { id: 'linkedin', color: '#0080ff', icon: 'assets/linkedin.png', url: 'https://linkedin.com' },
            { id: 'github', color: '#000000', icon: 'assets/github.png', url: 'https://github.com' },
            { id: 'youtube', color: '#FF0000', icon: 'assets/youtube.png', url: 'https://youtube.com' },
            { id: 'x', color: '#000000', icon: 'assets/x.png', url: 'https://twitter.com' },
            { id: 'dribbble', color: '#00ff2a', icon: 'assets/whatsapp.png', url: 'https://dribbble.com' },
            { id: 'behance', color: '#ff00bf', icon: 'assets/tiktok.png', url: 'https://behance.net' }
        ];

        const wheel = document.getElementById('wheel');
        let iconElements = [];
        let radius = window.innerWidth > 768 ? 240 : 155; // Responsive radius

        // 1. Build Wheel
        function buildWheel() {
            wheel.innerHTML = '';
            iconElements = [];
            const total = linksData.length;
            
            linksData.forEach((item, index) => {
                const angle = (index / total) * (2 * Math.PI);
                const el = document.createElement('div');
                el.className = 'icon-item';
                
                const img = document.createElement('img');
                img.src = item.icon;
                img.alt = item.id;
                el.appendChild(img);
                
                el.dataset.url = item.url;
                wheel.appendChild(el);
                iconElements.push({ el, angle, index });
            });
            
            updatePositions();
        }

        // Update positions smoothly on resize
        function updatePositions() {
            radius = window.innerWidth > 768 ? 240 : 155;
            iconElements.forEach(item => {
                const x = Math.sin(item.angle) * radius;
                const y = -Math.cos(item.angle) * radius;
                item.el.style.left = `calc(50% + ${x}px)`;
                item.el.style.top = `calc(50% + ${y}px)`;
            });
        }

        buildWheel();
        window.addEventListener('resize', updatePositions);

        // 2. Physics & Drag variables
        let currentAngle = 0;
        let targetAngle = 0;
        const lerpFactor = 0.08; 
        let isDragging = false;
        let startX = 0;
        let dragDistance = 0;

        // 3. Animation Loop (Smooth Lerp + Color Sync)
        function animate() {
            currentAngle += (targetAngle - currentAngle) * lerpFactor;
            
            // Rotate Wheel
            wheel.style.transform = `translate(-50%, -50%) rotate(${currentAngle}deg)`;
            
            // Counter-rotate Icons
            iconElements.forEach(item => {
                item.el.style.transform = `translate(-50%, -50%) rotate(${-currentAngle}deg)`;
            });

            // Color Calculation
            const anglePerIcon = 360 / linksData.length;
            let floatIndex = -currentAngle / anglePerIcon;
            let activeIndex = Math.round(floatIndex) % linksData.length;
            if (activeIndex < 0) activeIndex += linksData.length; 

            // Update CSS Variable for glow and active nav item
            const activeColor = linksData[activeIndex].color;
            document.documentElement.style.setProperty('--active-color', activeColor);

            requestAnimationFrame(animate);
        }
        animate();

        // 4. Input Events
        window.addEventListener('wheel', (e) => {
            targetAngle += e.deltaY * 0.15;
        });

        function handleStart(e) {
            isDragging = true;
            dragDistance = 0;
            startX = e.touches ? e.touches[0].clientX : e.clientX;
            wheel.style.cursor = 'grabbing';
        }

        function handleMove(e) {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const deltaX = clientX - startX;
            targetAngle += deltaX * 0.6; // slightly increased sensitivity
            dragDistance += Math.abs(deltaX);
            startX = clientX;
        }

        function handleEnd() {
            isDragging = false;
            wheel.style.cursor = 'default';
        }

        window.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);

        window.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        // 5. Clicks
        iconElements.forEach(item => {
            item.el.addEventListener('click', (e) => {
                if (dragDistance > 5) {
                    e.preventDefault();
                    return;
                }
                window.open(item.el.dataset.url, '_blank');
            });
        });
    </script>
</body>
</html>
